name: Build

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'
  workflow_dispatch:
    inputs:
      app_version:
        description: 'Semantic version for this build, for example 1.2.3 or 1.2.3-beta.1.'
        required: true
        type: string
      build-ios:
        description: 'Whether to build the iOS app. If false, only the Android app will be built.'
        required: false
        type: boolean
        default: false
      build-android:
        description: 'Whether to build the Android app. If false, only the iOS app will be built.'
        required: false
        type: boolean
        default: true
env:
  FLUTTER_VERSION: '3.35.7'

permissions:
  actions: read
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  metadata:
    name: Build metadata
    runs-on: ubuntu-latest
    outputs:
      version_label: ${{ steps.metadata.outputs.version_label }}
      build_name: ${{ steps.metadata.outputs.build_name }}
      build_number: ${{ steps.metadata.outputs.build_number }}
      artifact_suffix: ${{ steps.metadata.outputs.artifact_suffix }}
      is_prerelease: ${{ steps.metadata.outputs.is_prerelease }}
      release_name: ${{ steps.metadata.outputs.release_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve build metadata
        id: metadata
        shell: bash
        env:
          INPUT_APP_VERSION: ${{ github.event.inputs.app_version || '' }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version_label="${INPUT_APP_VERSION}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version_label="${GITHUB_REF_NAME#v}"
          else
            version_label="$(sed -nE 's/^version:[[:space:]]*([^+[:space:]]+).*/\1/p' pubspec.yaml | head -n 1)"
          fi

          build_number="${GITHUB_RUN_NUMBER}"

          if [[ -z "${version_label}" ]]; then
            echo "A semantic app version is required." >&2
            exit 1
          fi

          if [[ ! "${build_number}" =~ ^[1-9][0-9]*$ ]]; then
            echo "Build number must be a positive integer." >&2
            exit 1
          fi

          semver_regex='^([0-9]+)\.([0-9]+)\.([0-9]+)(-([0-9A-Za-z.-]+))?(\+([0-9A-Za-z.-]+))?$'
          if [[ ! "${version_label}" =~ ${semver_regex} ]]; then
            echo "Version must use SemVer, for example 1.2.3 or 1.2.3-beta.1." >&2
            exit 1
          fi

          build_name="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
          if [[ "${version_label}" == *-* ]]; then
            is_prerelease="true"
          else
            is_prerelease="false"
          fi

          safe_version="$(printf '%s' "${version_label}" | tr -cs 'A-Za-z0-9._-' '-' | sed -E 's/^-+//; s/-+$//')"
          artifact_suffix="${safe_version}+${build_number}"
          release_name="EveryClass ${version_label}"

          {
            echo "version_label=${version_label}"
            echo "build_name=${build_name}"
            echo "build_number=${build_number}"
            echo "artifact_suffix=${artifact_suffix}"
            echo "is_prerelease=${is_prerelease}"
            echo "release_name=${release_name}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "### Mobile build"
            echo ""
            echo "- Version label: ${version_label}"
            echo "- Flutter build name: ${build_name}"
            echo "- Build number: ${build_number}"
            echo "- Pre-release: ${is_prerelease}"
          } >> "${GITHUB_STEP_SUMMARY}"

  android:
    name: Android
    runs-on: ubuntu-latest
    needs: metadata
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android API 36
        shell: bash
        run: sdkmanager "platforms;android-36"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Configure Android signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -z "${ANDROID_KEYSTORE_BASE64}" ]]; then
            echo "Android signing secrets are not configured; using the project's fallback signing config." >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          missing=0
          for name in ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [[ -z "${!name}" ]]; then
              echo "${name} is required when ANDROID_KEYSTORE_BASE64 is set." >&2
              missing=1
            fi
          done
          if [[ "${missing}" -ne 0 ]]; then
            exit 1
          fi

          printf '%s' "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > android/app/release-keystore.jks
          {
            echo "storeFile=release-keystore.jks"
            echo "storePassword=${ANDROID_KEYSTORE_PASSWORD}"
            echo "keyAlias=${ANDROID_KEY_ALIAS}"
            echo "keyPassword=${ANDROID_KEY_PASSWORD}"
          } > android/key.properties

      - name: Fetch dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --build-name "${{ needs.metadata.outputs.build_name }}" --build-number "${{ needs.metadata.outputs.build_number }}"

      - name: Build app bundle
        run: flutter build appbundle --release --build-name "${{ needs.metadata.outputs.build_name }}" --build-number "${{ needs.metadata.outputs.build_number }}"

      - name: Collect Android artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-release.apk "artifacts/everyclass-android-${{ needs.metadata.outputs.artifact_suffix }}.apk"
          cp build/app/outputs/bundle/release/app-release.aab "artifacts/everyclass-android-${{ needs.metadata.outputs.artifact_suffix }}.aab"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: everyclass-android-${{ needs.metadata.outputs.artifact_suffix }}
          path: artifacts/*
          if-no-files-found: error

  ios:
    name: iOS
    runs-on: macos-latest
    needs: metadata
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Fetch dependencies
        run: flutter pub get

      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign --build-name "${{ needs.metadata.outputs.build_name }}" --build-number "${{ needs.metadata.outputs.build_number }}"

      - name: Collect iOS artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          ditto -c -k --sequesterRsrc --keepParent build/ios/iphoneos/Runner.app "artifacts/everyclass-ios-${{ needs.metadata.outputs.artifact_suffix }}-unsigned-app.zip"

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: everyclass-ios-${{ needs.metadata.outputs.artifact_suffix }}
          path: artifacts/*
          if-no-files-found: error

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - metadata
      - android
      - ios
    if: github.event_name == 'push' && github.ref_type == 'tag'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --current --strip header
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.metadata.outputs.release_name }}
          prerelease: ${{ needs.metadata.outputs.is_prerelease }}
          make_latest: ${{ needs.metadata.outputs.is_prerelease == 'true' && 'false' || 'true' }}
          body: ${{ steps.git-cliff.outputs.content }}
          files: release-artifacts/*
